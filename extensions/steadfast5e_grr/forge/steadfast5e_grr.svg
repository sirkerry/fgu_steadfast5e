<?xml version="1.0" encoding="UTF-8"?>
<svg width="768" height="768" viewBox="0 0 768 768" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Steadfast 5E Gritty Realism Rest icon</title>
  <desc>A heraldic shield in dark steel with a bed and Steadfast5E branding</desc>
  <style>
    .shield-body { fill: #2a2d35; stroke: #c9a84c; stroke-width: 6; }
    .shield-inner { fill: none; stroke: #c9a84c; stroke-width: 3; opacity: 0.5; }
    .sub-text { font-family: serif; font-weight: 400; fill: #a08030; }
    .rivet { fill: #c9a84c; }
  </style>
  <g transform="translate(384, 384)">
    <!-- Shield -->
    <path class="shield-body" d="M0,-300 L225,-228 L255,42 Q255,210 0,300 Q-255,210 -255,42 L-225,-228 Z"/>
    <path class="shield-inner" d="M0,-264 L192,-198 L219,36 Q219,180 0,264 Q-219,180 -219,36 L-192,-198 Z"/>
    <line x1="-219" y1="-30" x2="219" y2="-30" stroke="#c9a84c" stroke-width="2" opacity="0.4"/>

    <!-- Rivets -->
    <circle class="rivet" cx="0" cy="-285" r="9"/>
    <circle class="rivet" cx="-200" cy="-218" r="9"/>
    <circle class="rivet" cx="200" cy="-218" r="9"/>
    <circle class="rivet" cx="-238" cy="42" r="9"/>
    <circle class="rivet" cx="238" cy="42" r="9"/>
    <circle class="rivet" cx="0" cy="285" r="9"/>

    <!-- Bed -->
    <g transform="translate(0,15) rotate(-4)">
      <g fill="#e8c96a" stroke="#e8c96a">
        <!-- legs -->
        <rect x="-80" y="40" width="10" height="18" rx="2"/>
        <rect x="70" y="40" width="10" height="18" rx="2"/>
        <!-- frame base -->
        <rect x="-88" y="22" width="176" height="18" rx="4"/>
        <!-- headboard -->
        <rect x="-98" y="-60" width="20" height="82" rx="6"/>
        <!-- mattress -->
        <rect x="-80" y="-8" width="168" height="30" rx="10" stroke="none"/>
        <!-- pillow -->
        <rect x="-72" y="-22" width="44" height="22" rx="10" fill="#2a2d35" opacity="0.3" stroke="none"/>
        <!-- blanket fold creases -->
        <line x1="-15" y1="-8" x2="-15" y2="22" stroke="#2a2d35" stroke-width="3" opacity="0.4"/>
        <line x1="40" y1="-8" x2="40" y2="22" stroke="#2a2d35" stroke-width="2" opacity="0.3"/>
      </g>
      <!-- sleep marks -->
      <text x="-70" y="-68" font-family="serif" font-size="24" fill="#e8c96a" opacity="0.9">z</text>
      <text x="-50" y="-94" font-family="serif" font-size="18" fill="#e8c96a" opacity="0.75">z</text>
      <text x="-35" y="-112" font-family="serif" font-size="13" fill="#e8c96a" opacity="0.6">z</text>
    </g>

    <!-- Text -->
    <text class="sub-text" x="0" y="-155" font-size="30" text-anchor="middle" letter-spacing="6">Steadfast5e</text>
    <text class="sub-text" x="0" y="170" font-size="20" text-anchor="middle" letter-spacing="3">GRITTY REALISM REST</text>
  </g>
</svg>
