<?xml version="1.0" encoding="UTF-8"?>
<svg width="768" height="768" viewBox="0 0 768 768" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Steadfast 5E Location System icon</title>
  <desc>A heraldic shield in dark steel with a folded map and Steadfast5E branding</desc>
  <style>
    .shield-body { fill: #2a2d35; stroke: #c9a84c; stroke-width: 6; }
    .shield-inner { fill: none; stroke: #c9a84c; stroke-width: 3; opacity: 0.5; }
    .sub-text { font-family: serif; font-weight: 400; fill: #a08030; }
    .rivet { fill: #c9a84c; }
  </style>
  <g transform="translate(384, 384)">
    <!-- Shield -->
    <path class="shield-body" d="M0,-300 L225,-228 L255,42 Q255,210 0,300 Q-255,210 -255,42 L-225,-228 Z"/>
    <path class="shield-inner" d="M0,-264 L192,-198 L219,36 Q219,180 0,264 Q-219,180 -219,36 L-192,-198 Z"/>
    <line x1="-219" y1="-30" x2="219" y2="-30" stroke="#c9a84c" stroke-width="2" opacity="0.4"/>

    <!-- Rivets -->
    <circle class="rivet" cx="0" cy="-285" r="9"/>
    <circle class="rivet" cx="-200" cy="-218" r="9"/>
    <circle class="rivet" cx="200" cy="-218" r="9"/>
    <circle class="rivet" cx="-238" cy="42" r="9"/>
    <circle class="rivet" cx="238" cy="42" r="9"/>
    <circle class="rivet" cx="0" cy="285" r="9"/>

    <!-- Folded map -->
    <g transform="translate(0,10) rotate(-6)">
      <!-- deckle-edged parchment body -->
      <path d="M-95,-70 L-70,-78 L-40,-68 L-10,-80 L20,-68 L50,-80 L80,-70 L95,-75
               L95,68 L70,76 L40,66 L10,78 L-20,66 L-50,78 L-80,68 L-95,75 Z"
            fill="#e8c96a" stroke="#c9a84c" stroke-width="3"/>
      <!-- fold creases -->
      <line x1="-32" y1="-74" x2="-32" y2="72" stroke="#2a2d35" stroke-width="3" opacity="0.5"/>
      <line x1="30" y1="-74" x2="30" y2="72" stroke="#2a2d35" stroke-width="3" opacity="0.5"/>
      <!-- route with waypoint and destination marker -->
      <path d="M-70,45 Q-40,-10 -5,10 T65,-40" fill="none" stroke="#2a2d35" stroke-width="4" stroke-dasharray="2,9" stroke-linecap="round" opacity="0.7"/>
      <circle cx="-70" cy="45" r="6" fill="#2a2d35" opacity="0.7"/>
      <g transform="translate(65,-40)" stroke="#2a2d35" stroke-width="5" stroke-linecap="round" opacity="0.8">
        <line x1="-8" y1="-8" x2="8" y2="8"/>
        <line x1="8" y1="-8" x2="-8" y2="8"/>
      </g>
    </g>

    <!-- Text -->
    <text class="sub-text" x="0" y="-155" font-size="30" text-anchor="middle" letter-spacing="6">Steadfast5e</text>
    <text class="sub-text" x="0" y="170" font-size="24" text-anchor="middle" letter-spacing="4">LOCATION SYSTEM</text>
  </g>
</svg>
