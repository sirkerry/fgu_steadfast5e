<?xml version="1.0" encoding="UTF-8"?>
<svg width="768" height="768" viewBox="0 0 768 768" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Steadfast 5E Expanded Skills icon</title>
  <desc>A heraldic shield in dark steel with a crossed sword and quill and Steadfast5E branding</desc>
  <style>
    .shield-body { fill: #2a2d35; stroke: #c9a84c; stroke-width: 6; }
    .shield-inner { fill: none; stroke: #c9a84c; stroke-width: 3; opacity: 0.5; }
    .sub-text { font-family: serif; font-weight: 400; fill: #a08030; }
    .rivet { fill: #c9a84c; }
  </style>
  <g transform="translate(384, 384)">
    <!-- Shield -->
    <path class="shield-body" d="M0,-300 L225,-228 L255,42 Q255,210 0,300 Q-255,210 -255,42 L-225,-228 Z"/>
    <path class="shield-inner" d="M0,-264 L192,-198 L219,36 Q219,180 0,264 Q-219,180 -219,36 L-192,-198 Z"/>
    <line x1="-219" y1="-30" x2="219" y2="-30" stroke="#c9a84c" stroke-width="2" opacity="0.4"/>

    <!-- Rivets -->
    <circle class="rivet" cx="0" cy="-285" r="9"/>
    <circle class="rivet" cx="-200" cy="-218" r="9"/>
    <circle class="rivet" cx="200" cy="-218" r="9"/>
    <circle class="rivet" cx="-238" cy="42" r="9"/>
    <circle class="rivet" cx="238" cy="42" r="9"/>
    <circle class="rivet" cx="0" cy="285" r="9"/>

    <!-- Quill UNDER sword (drawn first, rotated +35deg) -->
    <g transform="translate(0,20) rotate(35)" fill="#e8c96a" stroke="#e8c96a" opacity="0.9">
      <line x1="0" y1="-160" x2="0" y2="80" stroke="#e8c96a" stroke-width="3"/>
      <path d="M0,-160 Q-40,-120 -30,-60 Q-20,-20 0,20" fill="#c9a84c" stroke="none" opacity="0.85"/>
      <path d="M0,-160 Q40,-120 30,-60 Q20,-20 0,20" fill="#c9a84c" stroke="none" opacity="0.85"/>
      <polygon points="0,80 -6,50 6,50" fill="#e8c96a" stroke="none"/>
    </g>

    <!-- Sword ON TOP of quill (drawn second, rotated -35deg) -->
    <g transform="translate(0,20) rotate(-35)" fill="#e8c96a" stroke="#e8c96a">
      <polygon points="0,-190 8,-20 -8,-20" />
      <rect x="-38" y="-24" width="76" height="10" rx="3"/>
      <rect x="-7" y="-14" width="14" height="60" rx="3"/>
      <ellipse cx="0" cy="52" rx="14" ry="10"/>
    </g>

    <!-- Text -->
    <text class="sub-text" x="0" y="-155" font-size="30" text-anchor="middle" letter-spacing="6">Steadfast5e</text>
    <text class="sub-text" x="0" y="170" font-size="24" text-anchor="middle" letter-spacing="4">EXPANDED SKILLS</text>
  </g>
</svg>
